<main>
  <section class="first-part">
    <figure>
      <img src="/assets/superSalgadosLogo.png" alt="Logo Super Salgados" />
    </figure>
  </section>

  <section class="second-part">
    <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <h1 class="form__title">Junte-se a nós!</h1>
      <p class="form__subtitle">Cadastre-se e comece a comprar salgados.</p>

      <div class="form__input-wrapper">
        <label class="form__label" for="nome">Nome</label>
        <div class="input__relative">
          <input
            type="text"
            id="nome"
            formControlName="nome"
            class="form__input"
            placeholder="Digite seu nome"
            required
          />
        </div>
      </div>

      <div class="form__input-wrapper">
        <label class="form__label" for="email">E-mail</label>
        <div class="input-relative">
          <input
            type="email"
            id="email"
            formControlName="email"
            class="form__input"
            placeholder="Digite seu e-mail"
            required
          />
        </div>
      </div>

      <div class="form__input-wrapper">
        <label class="form__label" for="password">Senha</label>
        <div class="input-relative">
          <input
            [type]="mostrarSenha ? 'text' : 'password'"
            id="senha"
            formControlName="senha"
            class="form__input"
            placeholder="Digite sua senha"
            required
          />
          <i
            class="ph form__input-icon"
            [class.ph-eye]="!mostrarSenha"
            [class.ph-eye-slash]="mostrarSenha"
            (click)="exibirSenha()"
          ></i>
        </div>
      </div>

      <div class="form__input-wrapper">
        <label class="form__label" for="password">Confirmar Senha</label>
        <div class="input-relative">
          <input
            [type]="mostrarConfirmarSenha ? 'text' : 'password'"
            id="confirmar-senha"
            formControlName="confirmarSenha"
            class="form__input"
            placeholder="Confirme sua senha"
            required
          />
          <i
            class="ph form__input-icon"
            [class.ph-eye]="!mostrarConfirmarSenha"
            [class.ph-eye-slash]="mostrarConfirmarSenha"
            (click)="exibirConfirmarSenha()"
          ></i>
        </div>
      </div>

      @if (erro) {
        <p style="color: red">{{ erro }}</p>
      }

      <button type="submit" class="form__button-login">Criar Conta</button>

      <p class="form__create-account">
        Já faz parte do sistema? <a routerLink="/login">Faça login aqui!</a>
      </p>
    </form>
  </section>
</main>
