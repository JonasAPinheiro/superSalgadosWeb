<header class="header">
  <div class="header__logo">
    <img src="/assets/superSalgadosLogo.png" alt="Logo" />
    <span>SuperSalgados</span>
  </div>

  <nav class="header__nav">
    <button class="header__novo-pedido" routerLink="/pedido">
      <i class="ph ph-fork-knife"></i>
      Novo pedido
    </button>

    <a class="header__link" routerLink="/historico">
      <i class="ph ph-file-text"></i>
      Histórico
    </a>

    <span class="header__divider"></span>

    <span class="header__usuario"
      >Olá, <strong>{{ nomeCliente }}</strong></span
    >

    <button class="header__sair" (click)="sair()" aria-label="Sair">
      <i class="ph ph-sign-out"></i>
    </button>
  </nav>
</header>
